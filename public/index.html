<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Auth · minimal aesthetic</title>
  <!-- Poppins & Inter hybrid feel -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(145deg, #f9f7f5 0%, #f0ede9 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "Inter", "Plus Jakarta Sans", system-ui, -apple-system, sans-serif;
      padding: 1.5rem;
      margin: 0;
    }

    .card {
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 40px;
      box-shadow: 
        0 20px 40px -12px rgba(0, 0, 0, 0.08),
        0 8px 24px -6px rgba(0, 0, 0, 0.05),
        inset 0 1px 0 rgba(255, 255, 255, 0.6);
      width: 100%;
      max-width: 460px;
      padding: 2.5rem 2rem 2.25rem;
      border: 1px solid rgba(255, 255, 255, 0.5);
      transition: transform 0.25s ease;
    }

    .card:hover {
      transform: scale(1.002);
      box-shadow: 0 24px 48px -14px rgba(0, 0, 0, 0.12);
    }

    h2 {
      font-size: 2.1rem;
      font-weight: 530;
      letter-spacing: -0.02em;
      color: #1e1e1f;
      margin-bottom: 0.2rem;
      font-family: "Plus Jakarta Sans", "Inter", sans-serif;
    }

    .badge {
      display: inline-block;
      background: #e9e4dd;
      color: #3a3a3c;
      font-size: 0.8rem;
      font-weight: 500;
      padding: 0.2rem 1rem;
      border-radius: 40px;
      margin-bottom: 2rem;
      border: 0.5px solid rgba(0, 0, 0, 0.05);
      backdrop-filter: blur(4px);
      letter-spacing: 0.01em;
    }

    .input-group {
      margin-bottom: 1.4rem;
    }

    label {
      display: block;
      font-size: 0.8rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      color: #5b5b60;
      margin-bottom: 0.4rem;
    }

    .input-field {
      width: 100%;
      padding: 0.9rem 1.2rem;
      font-size: 1rem;
      font-family: "Inter", sans-serif;
      background: rgba(255, 255, 255, 0.7);
      border: 1.5px solid rgba(210, 205, 200, 0.4);
      border-radius: 24px;
      outline: none;
      color: #1a1a1c;
      font-weight: 450;
      transition: all 0.2s;
      box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.01);
    }

    .input-field:focus {
      border-color: #b9aea2;
      background: rgba(255, 255, 255, 0.95);
      box-shadow: 0 0 0 4px rgba(170, 150, 130, 0.08), inset 0 1px 3px transparent;
    }

    .input-field::placeholder {
      color: #a6a2a0;
      font-weight: 350;
      font-size: 0.95rem;
    }

    .button-group {
      display: flex;
      gap: 0.75rem;
      margin: 2rem 0 1.8rem;
    }

    .btn {
      flex: 1;
      padding: 0.9rem 0.2rem;
      border: none;
      border-radius: 60px;
      font-weight: 580;
      font-size: 1rem;
      font-family: "Plus Jakarta Sans", "Inter", sans-serif;
      letter-spacing: -0.01em;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.23, 1, 0.32, 1);
      background: transparent;
      border: 1.5px solid transparent;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.02);
    }

    .btn-primary {
      background: #1f1f22;
      color: #f5f3f0;
      box-shadow: 0 8px 18px -8px rgba(30, 30, 32, 0.2);
    }

    .btn-primary:hover {
      background: #2e2e33;
      transform: translateY(-2px);
      box-shadow: 0 14px 22px -10px rgba(20, 20, 22, 0.25);
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.6);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1.5px solid rgba(210, 200, 190, 0.4);
      color: #2b2b2e;
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.9);
      border-color: #c0b6ab;
      transform: translateY(-2px);
      box-shadow: 0 8px 14px -8px rgba(0, 0, 0, 0.08);
    }

    .result-container {
      margin-top: 1.2rem;
    }

    .result-label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #5f5b58;
      margin-bottom: 0.5rem;
    }

    .result-label span {
      background: #d9d2ca;
      width: 6px;
      height: 6px;
      border-radius: 10px;
      display: inline-block;
    }

    pre {
      background: rgba(22, 22, 24, 0.04);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-radius: 24px;
      padding: 1.2rem 1.4rem;
      font-family: "SF Mono", "Menlo", "Monaco", "Cascadia Code", monospace;
      font-size: 0.8rem;
      line-height: 1.5;
      color: #1e1e21;
      border: 1px solid rgba(210, 200, 190, 0.3);
      white-space: pre-wrap;
      word-break: break-word;
      max-height: 280px;
      overflow-y: auto;
      box-shadow: inset 0 2px 5px rgba(0,0,0,0.02);
      transition: background 0.15s;
    }

    pre:empty {
      display: none;
    }

    /* subtle scroll */
    pre::-webkit-scrollbar {
      width: 6px;
    }

    pre::-webkit-scrollbar-track {
      background: transparent;
    }

    pre::-webkit-scrollbar-thumb {
      background: #c9c1b9;
      border-radius: 20px;
    }

    .footnote {
      margin-top: 1.1rem;
      text-align: right;
      color: #8c8884;
      font-size: 0.7rem;
      font-weight: 430;
      opacity: 0.8;
    }

    /* little animation for result update */
    .flash-pre {
      transition: background 0.1s;
    }
  </style>
</head>
<body>

<div class="card">
  <h2>Auth · demo</h2>
  <div class="badge">backend test ready</div>

  <!-- email field -->
  <div class="input-group">
    <label>📧 Email</label>
    <input id="email" class="input-field" type="email" placeholder="example@gmail.com" autocomplete="email" />
  </div>

  <!-- password field -->
  <div class="input-group">
    <label>🔒 Password</label>
    <input id="password" class="input-field" type="password" placeholder="••••••••" autocomplete="current-password" />
  </div>

  <!-- buttons (same functions: register / login) -->
  <div class="button-group">
    <button class="btn btn-primary" onclick="register()">Register</button>
    <button class="btn btn-secondary" onclick="login()">Login</button>
  </div>

  <!-- result area with a clean label -->
  <div class="result-container">
    <div class="result-label">
      <span></span> response
    </div>
    <pre id="result">{ }</pre>
  </div>
  <div class="footnote">↳ fetch → /register · /login</div>
</div>

<script>
  (function() {
    // keep exactly same logic as original — just added minor UX polish
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const resultPre = document.getElementById('result');

    // helper to display json nicely (same as before)
    function display(data) {
      resultPre.innerText = JSON.stringify(data, null, 2);
      // tiny pulse effect (aesthetic)
      resultPre.style.transition = 'background 0.08s';
      resultPre.style.background = 'rgba(240, 235, 225, 0.3)';
      setTimeout(() => resultPre.style.background = '', 70);
    }

    async function register() {
      const email = emailInput.value;
      const password = passwordInput.value;

      // show loading indicator in pre? just small text hint.
      resultPre.innerText = '⏳ registering...';

      try {
        const res = await fetch("/register", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        display(data);
      } catch (error) {
        display({ error: error.message || 'Network / fetch error' });
      }
    }

    async function login() {
      const email = emailInput.value;
      const password = passwordInput.value;

      resultPre.innerText = '⏳ logging in...';

      try {
        const res = await fetch("/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        display(data);
      } catch (error) {
        display({ error: error.message || 'Network / fetch error' });
      }
    }

    // expose to global (onclick works)
    window.register = register;
    window.login = login;

    // set default placeholder result (aesthetic)
    display({ message: 'ready — test register or login' });

    // also enter key convenience (optional)
    passwordInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        // default to login on enter, but you can change if you like.
        login();
      }
    });
    emailInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        login();
      }
    });
  })();
</script>
</body>
</html>
